<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>GoIT Markup HW-02</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/1.1.0/modern-normalize.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1 class="logo">Portfolio</h1>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="#" class="nav-link">Home</a></li>
          <li><a href="#" class="nav-link">About</a></li>
          <li><a href="#" class="nav-link">Portfolio</a></li>
          <li><a href="#" class="nav-link">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="portfolio">
      <div class="container">
        <h2 class="section-title">Our Portfolio</h2>
        <ul class="portfolio-list">
          <li class="portfolio-item">
            <img src="images/portfolio1.jpg" alt="Portfolio item 1" width="300">
            <h3 class="portfolio-title">Project Title 1</h3>
          </li>
          <li class="portfolio-item">
            <img src="images/portfolio2.jpg" alt="Portfolio item 2" width="300">
            <h3 class="portfolio-title">Project Title 2</h3>
          </li>
          <li class="portfolio-item">
            <img src="images/portfolio3.jpg" alt="Portfolio item 3" width="300">
            <h3 class="portfolio-title">Project Title 3</h3>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer-text">© 2025 Portfolio. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
